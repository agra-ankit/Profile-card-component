<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Profile card component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <img class="pattern top-bg" src="images/bg-pattern-top.svg" alt="" />

      <img
        class="pattern bottom-bg"
        src="images/bg-pattern-bottom.svg"
        alt=""
      />
      <article class="profile-card">
        <img class="card-banner" src="images/bg-pattern-card.svg" alt="" />
        <div class="card-body">
          <img class="profile-img" src="images/image-victor.jpg" alt="" />
          <h1 class="profile-name">Victor Crest <span>26</span></h1>
          <p class="place">London</p>
        </div>
        <ul class="card-stats">
          <li class="stat-item">
            <p class="stat-number">80K</p>
            <p class="stat-label">Followers</p>
          </li>
          <li class="stat-item">
            <p class="stat-number">803K</p>
            <p class="stat-label">Likes</p>
          </li>
          <li class="stat-item">
            <p class="stat-number">1.4K</p>
            <p class="stat-label">Photos</p>
          </li>
        </ul>
      </article>
    </main>
  </body>
</html>
